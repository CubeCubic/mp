<!doctype html>
<html lang="ka"> <!-- Язык страницы: грузинский -->
<head>
  <meta charset="utf-8"> <!-- Кодировка -->
  <meta name="viewport" content="width=device-width,initial-scale=1"> <!-- Адаптивность -->
  <title>Cube Cubic</title> <!-- Заголовок вкладки браузера -->

  <!-- Фавикон -->
  <link rel="icon" type="image/png" sizes="32x32" href="/images/smallcube.png">
  <link rel="icon" type="image/png" sizes="64x64" href="/images/smallcube.png">
  <link rel="apple-touch-icon" href="/images/smallcube.png">

  <!-- Подключение стилей -->
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <header>
    <!-- Главный заголовок сайта -->
    <h1>Cube Cubic - კეთილი იყოს თქვენი მობრძანება</h1>
    <nav>
      <!-- Ссылка на админку -->
      <a href="/admin.html">ადმინი</a>
    </nav>
  </header>

  <main id="app">
    <!-- Секция альбомов -->
    <section id="albums-section">
      <h2>ალბომები</h2>
      <div id="albums"></div>
    </section>

    <!-- Секция треков -->
    <section id="tracks-section">
      <h2>ტრეკები</h2>
      <div id="tracks"></div>
    </section>
  </main>

  <!-- Плеер -->
  <div id="player" class="hidden" role="region" aria-label="Player">
    <div id="player-cover">
      <img id="player-cover-img" src="" alt="">
    </div>
    <div id="player-info">
      <div id="player-title"></div>
      <div id="player-artist"></div>

      <!-- Прогресс -->
      <div id="player-progress">
        <span id="time-current">0:00</span>
        <input id="progress" type="range" min="0" max="100" step="0.1" value="0" aria-label="Progress">
        <span id="time-duration">0:00</span>
      </div>

      <!-- Кнопки управления -->
      <div id="player-controls">
        <button id="prev" title="წინა">⏮</button>
        <button id="play" title="პაუზა/დაწყება">⏸</button>
        <button id="next" title="შემდეგი">⏭</button>
        <label>ხმა: <input id="volume" type="range" min="0" max="1" step="0.01" value="1"></label>
        <button id="show-lyrics" title="ლირიკა">ტექსტი</button>
        <!-- теперь кнопка, а не ссылка -->
        <button id="download" data-download="">ჩამოტვირთვა</button>
      </div>
    </div>
    <audio id="audio" preload="auto"></audio>
  </div>

  <!-- Мини-плеер -->
  <div id="player-mini" class="hidden" aria-hidden="true" title="აღდგენა">
    <button id="mini-resume">▶</button>
  </div>

  <!-- Модальное окно для текста песни -->
  <div id="lyrics-modal" class="hidden" role="dialog" aria-modal="true">
    <div class="modal-box">
      <button id="modal-close" aria-label="close">✖</button>
      <h3 id="modal-title"></h3>
      <pre id="modal-lyrics"></pre>
    </div>
  </div>

  <!-- Подключение скрипта -->
  <script src="/app.js"></script>
</body>
</html>
