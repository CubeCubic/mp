<!doctype html>
<html lang="ka">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Cube Cubic</title>
  <link rel="icon" type="image/png" href="/images/smallcube.png">  <!-- Add this line for the favicon -->
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <header>
    <h1>Cube Cubic - კეთღილი იყოს თქვენი მობრძანება</h1>
    <nav>
      <a href="/admin.html">ადმინი</a>
    </nav>
  </header>
  <main id="app">
    <section id="albums-section">
      <h2>ალბომები</h2>
      <div id="albums"></div>
    </section>
    <section id="tracks-section">
      <h2>ტრეკები</h2>
      <div id="tracks"></div>
    </section>
  </main>
  <!-- Full player (hidden until playback starts) -->
    <div id="player-cover"><img id="player-cover-img" src="" alt=""></div>
    <div id="player-info">
      <div id="player-title"></div>
      <div id="player-artist"></div>
      <!-- Progress bar -->
      <div id="player-progress">
        <span id="time-current">0:00</span>
        <input id="progress" type="range" min="0" max="100" step="0.1" value="0" aria-label="Progress">
        <span id="time-duration">0:00</span>
      </div>
      <div id="player-controls">
        <button id="prev" title="წინა">⏮</button>
        <button id="play" title="პაუზა/დაწყება">⏸</button>
        <button id="next" title="შემდეგი">⏭</button>
        <label><input id="volume" type="range" min="0" max="1" step="0.01" value="1"></label>
        <!-- NEW: lyrics button above download -->
        <button id="show-lyrics" title="ლირიკა">ტექსტი</button>
        <a id="download" href="#" download>ჩამოტვირთვა</a>
      </div>
    </div>
    <audio id="audio" preload="auto"></audio>
  </div>
    <!-- Lyrics modal -->
  <div id="lyrics-modal" class="hidden" role="dialog" aria-modal="true">
    <div class="modal-box">
      <button id="modal-close" aria-label="close">✖</button>
      <h3 id="modal-title"></h3>
      <pre id="modal-lyrics"></pre>
    </div>
  </div>
  <script src="/app.js"></script>
</body>
</html>
