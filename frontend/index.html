<!doctype html>
<html lang="ka">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Cube Cubic</title>

  <link rel="icon" type="image/png" sizes="32x32" href="/images/smallcube.png">
  <link rel="icon" type="image/png" sizes="64x64" href="/images/smallcube.png">
  <link rel="apple-touch-icon" href="/images/smallcube.png">

  <link rel="stylesheet" href="/styles.css">
  <style>
    /* Минимальные стили для плеера и сетки треков */
    #tracks { display:grid; grid-template-columns: repeat(2,1fr); gap:14px; margin-top:12px; }
    @media (max-width:880px) { #tracks { grid-template-columns:1fr; } }

    #player { position:fixed; left:50%; transform:translateX(-50%); bottom:18px; width:calc(100% - 40px); max-width:980px; background:#111; color:#fff; border-radius:12px; padding:10px 12px; display:flex; gap:12px; align-items:center; box-shadow:0 10px 30px rgba(0,0,0,0.6); z-index:1200; opacity:0; pointer-events:none; transition: opacity 220ms ease, transform 220ms ease; }
    #player.visible { opacity:1; pointer-events:auto; transform: translateX(-50%) translateY(0); }
    #player img { width:64px; height:64px; object-fit:cover; border-radius:8px; }
    #player .info { flex:1; display:flex; flex-direction:column; gap:4px; }
    #player .controls { display:flex; gap:8px; align-items:center; }
  </style>
</head>
<body>
  <main id="app">
    <section id="tracks-section">
      <h2>ტრეკები</h2>
      <div id="tracks"></div>
    </section>
  </main>

  <!-- Player -->
  <div id="player" class="hidden" role="region" aria-label="Player">
    <div id="player-cover">
      <img id="player-cover-img" src="/images/midcube.png" alt="">
    </div>

    <div id="player-info">
      <div id="player-title"></div>
      <div id="player-artist"></div>

      <div id="player-progress">
        <span id="time-current">0:00</span>
        <input id="progress" type="range" min="0" max="100" step="0.1" value="0" aria-label="Progress">
        <span id="time-duration">0:00</span>
      </div>

      <div id="player-controls">
        <button id="prev" title="წინა">⏮</button>
        <button id="play" title="პауза/воспроизведение">▶</button>
        <button id="next" title="შემდეგი">⏭</button>
        <label style="margin-left:8px;">ხმა: <input id="volume" type="range" min="0" max="1" step="0.01" value="1"></label>
        <button id="show-lyrics" title="ლირიკა">ტექსტი</button>
        <a id="download" href="#" download>ჩამოტვირთვა</a>
      </div>
    </div>

    <audio id="audio" preload="auto"></audio>
  </div>

  <div id="lyrics-modal" class="hidden" role="dialog" aria-modal="true">
    <div class="modal-box">
      <button id="modal-close" aria-label="close">✖</button>
      <h3 id="modal-title"></h3>
      <pre id="modal-lyrics"></pre>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
