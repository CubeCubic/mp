```html
<!doctype html>
<html lang="ka">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>ადმინისტრატორი — CubeCubic</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <header>
    <h1>ადმინისტრატორი</h1>
    <a href="/">საპუბლიკო გვერდი</a>
  </header>

  <main id="admin-app">
    <div id="login-form">
      <h2>შესვლა</h2>
      <input id="admin-password" type="password" placeholder="პაროლი">
      <button id="login-btn">შესვლა</button>
      <div id="login-msg"></div>
    </div>

    <div id="admin-panel" class="hidden">
      <h2>ტრექების მართვა</h2>

      <form id="add-track-form">
        <h3>ახალი ტრეკი</h3>
        <input name="title" placeholder="სათაური" required>
        <input name="artist" placeholder="ვოკალი/მეპერფორმერი">
        <input name="album" placeholder="ალბომის სახელი (სურვილისამებრ)">
        <textarea name="lyrics" placeholder="ლირიკა"></textarea>

        <h4>მეთოდი: (გირჩევთ archive.org)</h4>
        <label>Audio URL (archive.org): <input name="audioUrl" type="text" placeholder="https://archive.org/download/IDENTIFIER/FILE.mp3"></label>
        <label>Cover URL (archive.org): <input name="coverUrl" type="text" placeholder="https://archive.org/download/IDENTIFIER/cover.jpg"></label>

        <div style="margin-top:8px">თუ გინდათ, შეგიძლიათ პირდაპირ ატვირთოთ აქ (Server uploads):</div>
        <label>აუდიო (.mp3/.wav/.flac): <input name="audio" type="file" accept=".mp3,.wav,.flac"></label>
        <label>ობლო: <input name="cover" type="file" accept=".jpg,.jpeg,.png"></label>

        <button type="submit">დამატება</button>
      </form>

      <h3>არსებული ტრეკები</h3>
      <div id="admin-tracks"></div>

      <button id="logout-btn">გამოსვლა</button>
    </div>
  </main>

  <script src="/app.js"></script>
  <script src="/admin.js"></script>
</body>
</html>
```
