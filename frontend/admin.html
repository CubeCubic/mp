<!doctype html>
<html lang="ka">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Admin — Cube Cubic</title>
  <link rel="stylesheet" href="/styles.css">
  <style>
    body { font-family: Inter, Arial, sans-serif; color: #fff; background: #111; padding: 18px; }
    .panel { background: rgba(0,0,0,0.6); padding: 12px; border-radius: 8px; margin-bottom: 12px; }
    label { display:block; margin:8px 0 4px; color:#ffd; font-weight:600; }
    input, select, textarea { width:100%; padding:8px; border-radius:6px; border:1px solid #333; background:#111; color:#fff; }
    .row { display:flex; gap:12px; align-items:flex-start; }
    .col { flex:1; }
    .small { width:220px; flex:0 0 220px; }
    button { background:#444; color:#fff; padding:8px 12px; border-radius:6px; border:none; cursor:pointer; }
    .list { margin-top:12px; max-height:520px; overflow:auto; border-top:1px dashed rgba(255,255,255,0.06); padding-top:8px; }

    #admin-tracks { display:grid; grid-template-columns: repeat(2, 1fr); gap: 12px; align-items: start; }
    #admin-tracks .item { padding:12px; border-radius:10px; display:flex; gap:12px; align-items:flex-start; background:rgba(255,255,255,0.02); transition: transform .18s, box-shadow .18s; box-shadow: 0 6px 18px rgba(0,0,0,0.35); }
    #admin-tracks .item:hover { transform: translateY(-6px); box-shadow: 0 14px 40px rgba(0,0,0,0.45); }
    #admin-tracks .item img { width:100px; height:100px; object-fit:cover; border-radius:8px; }
    .muted { color:#999; font-size:13px; }
    .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display:flex; align-items:center; justify-content:center; z-index:2000; }
    .modal { background:#fff; color:#000; border-radius:8px; width:420px; padding:16px; }
  </style>
</head>
<body>
  <header><h1 style="color:#ffcc00">ადმინისტრატორი</h1></header>

  <main id="admin-app">
    <div id="login-form" class="panel">
      <h2>შესვლა</h2>
      <input id="admin-password" type="password" placeholder="პაროლი" />
      <div style="margin-top:8px">
        <button id="login-btn" type="button">შესვლა</button>
        <span id="login-msg" class="muted" style="margin-left:10px"></span>
      </div>
    </div>

    <div id="admin-panel" class="panel hidden" style="display:none">
      <div class="panel">
        <h2>ალბომები</h2>
        <div class="row">
          <div class="col">
            <label for="album-name">სახელი</label>
            <input id="album-name" type="text" placeholder="მაგ: Instrumental">
          </div>
          <div class="small">
            <label for="album-parent">Parent</label>
            <select id="album-parent"><option value="">— მთავარი —</option></select>
          </div>
          <div class="small" style="display:flex;flex-direction:column;justify-content:flex-end;gap:8px;">
            <button id="btn-create-album">Create album</button>
            <button id="btn-refresh-albums">Refresh</button>
          </div>
        </div>
        <div class="list" id="albums-list"></div>
      </div>

      <div class="panel">
        <h2>ტრეკის დამატება</h2>
        <form id="add-track-form" enctype="multipart/form-data">
          <div class="row">
            <div class="col">
              <label>Title</label><input name="title" required>
              <label>Artist</label><input name="artist">
              <label>Lyrics</label><textarea name="lyrics"></textarea>
            </div>
            <div class="small">
              <label for="track-album-select">Album</label>
              <select id="track-album-select" name="album"></select>
              <label>Audio URL</label><input name="audioUrl" type="text">
              <label>Cover URL</label><input name="coverUrl" type="text">
              <div style="margin-top:8px">Or upload files:</div>
              <label>Audio file: <input name="audio" type="file" accept=".mp3,.wav,.flac"></label>
              <label>Cover file: <input name="cover" type="file" accept=".jpg,.jpeg,.png"></label>
              <div style="margin-top:10px"><button type="submit">დამატება</button></div>
            </div>
          </div>
        </form>
      </div>

      <div class="panel">
        <h2>არსებული ტრეკები</h2>
        <div style="margin-bottom:8px"><button id="btn-refresh-tracks">Refresh tracks</button></div>
        <div id="admin-tracks" class="list"></div>
      </div>

      <div style="margin-top:8px"><button id="logout-btn">გასვლა</button></div>
    </div>
  </main>

  <div id="album-edit-modal" class="modal-backdrop hidden" aria-hidden="true" style="display:none">
    <div class="modal" role="dialog" aria-modal="true">
      <h3>Edit album</h3>
      <label>Name</label><input id="modal-album-name" type="text">
      <label>Parent</label><select id="modal-album-parent"></select>
      <div style="margin-top:12px;display:flex;justify-content:flex-end;gap:8px;">
        <button id="modal-cancel">Cancel</button>
        <button id="modal-save">Save</button>
      </div>
    </div>
  </div>

  <script src="/admin.js"></script>
</body>
</html>
