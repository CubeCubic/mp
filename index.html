<!doctype html>
<html lang="ka">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Cube Cubic</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <h1>Cube Cubic</h1>
    <p class="muted">კეთილი იყოს თქვენი მობრძანება</p>
  </header>

  <main>
    <section>
      <h2>ალბომები</h2>

      <div style="display:flex;gap:12px;align-items:center;">
        <label for="album-select">ალბომი</label>
        <select id="album-select" aria-label="Album select">
          <option value="">— Loading —</option>
        </select>

        <label id="subalbum-label" for="subalbum-select" style="display:none;margin-left:12px;">ქვეალბომი</label>
        <select id="subalbum-select" aria-label="Subalbum select" style="display:none;">
          <option value="">— —</option>
        </select>
      </div>
    </section>

    <section>
      <h2>ტრეკები</h2>
      <div id="tracks" aria-live="polite">
        <!-- Треки будут отрисованы сюда скриптом -->
      </div>
    </section>
  </main>

  <!-- Минимальная разметка плеера (app.js может использовать эти id) -->
  <div id="player" class="hidden" role="region" aria-label="Player">
    <div id="player-cover"><img id="player-cover-img" src="images/midcube.png" alt="cover"></div>
    <div id="player-info">
      <div id="player-title">Title</div>
      <div id="player-artist">Artist</div>
    </div>
    <div id="player-controls">
      <button id="prev" type="button">Prev</button>
      <button id="play" type="button">Play</button>
      <button id="next" type="button">Next</button>
      <button id="show-lyrics" type="button">ტექსტი</button>
      <a id="download" href="#" download>ჩამოტვირთვა</a>
    </div>
    <audio id="audio" preload="none"></audio>
    <div id="player-progress">
      <span id="time-current">0:00</span>
      <input id="progress" type="range" min="0" max="100" value="0">
      <span id="time-duration">0:00</span>
    </div>
  </div>

  <!-- Modal для текста песни -->
  <div id="lyrics-modal" class="hidden" aria-hidden="true">
    <div class="modal-box">
      <button id="modal-close" type="button">Close</button>
      <h3 id="modal-title">Lyrics</h3>
      <pre id="modal-lyrics"></pre>
    </div>
  </div>

  <!-- Скрипты: app.js должен подключаться после DOM -->
  <script src="app.js"></script>
</body>
</html>
