<!doctype html>
<html lang="ka">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Cube Cubic</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" type="image/png" href="images/smallcube.png">
</head>
<body>
  <div class="site-wrapper">
    <header class="site-header">
      <div class="header-inner">
        <div id="header-badge" aria-hidden="false">
          <img src="images/midcube.png" alt="midcube">
        </div>

        <div class="brand">
          <h1>Cube Cubic</h1>
          <p class="muted">კეთილი იყოს თქვენი მობრძანება</p>
        </div>

        <nav class="main-nav" aria-label="Main navigation">
          <a href="index.html" class="nav-link">Home</a>
          <a href="about.html" class="nav-link">About</a>
          <button id="contact-btn" type="button" class="nav-button">Contact</button>
          <a href="admin.html" class="nav-link">Admin</a>
        </nav>
      </div>
    </header>

    <main>
      <section class="controls-section">
        <div class="controls">
          <input id="global-search" type="text" placeholder="Search albums, subalbums, tracks..." aria-label="Global search">

          <div class="albums-block">
            <label for="album-select" class="albums-label">Albums</label>
            <input type="hidden" id="album-select" value="">
            <div id="album-thumbs" class="album-thumbs" aria-hidden="false"></div>
          </div>

          <div class="controls-right">
            <label id="subalbum-label" for="subalbum-select" style="display:none;">ქვეალბომი</label>
            <select id="subalbum-select" style="display:none;">
              <option value="">— —</option>
            </select>
            <button id="refresh-btn" type="button" class="btn">Refresh</button>
          </div>
        </div>
      </section>

      <section class="tracks-section">
        <div class="tracks-header">
          <h2>Tracks</h2>
        </div>

        <div id="tracks" class="tracks-table-wrapper">
          <!-- Table rendered by app.js -->
        </div>
      </section>
    </main>

    <div id="player" class="player hidden" aria-hidden="true">
      <div class="player-inner">
        <div id="player-cover" class="player-cover">
          <img id="player-cover-img" src="images/midcube.png" alt="cover">
        </div>
        <div id="player-info" class="player-info">
          <div id="player-title" class="player-title">Title</div>
          <div id="player-artist" class="player-artist">Artist</div>
        </div>
        <div id="player-controls" class="player-controls">
          <button id="prev" type="button" class="ctrl">⏮</button>
          <button id="play" type="button" class="ctrl">▶</button>
          <button id="next" type="button" class="ctrl">⏭</button>
          <button id="show-lyrics" type="button" style="display:none;" class="ctrl">ტექსტი</button>
          <a id="download" href="#" download style="display:none;" class="ctrl">ჩამოტვირთვა</a>
          <input id="volume" type="range" min="0" max="1" step="0.01" value="1" class="volume">
        </div>
      </div>

      <div id="player-progress" class="player-progress">
        <span id="time-current">0:00</span>
        <input id="progress" type="range" min="0" max="100" value="0" class="progress-range">
        <span id="time-duration">0:00</span>
      </div>

      <audio id="audio" preload="none"></audio>
    </div>

    <div id="lyrics-modal" class="modal hidden" aria-hidden="true">
      <div class="modal-box">
        <button id="modal-close" type="button" class="modal-close">Close</button>
        <h3 id="modal-title">Lyrics</h3>
        <pre id="modal-lyrics"></pre>
      </div>
    </div>

    <div id="contact-modal" class="modal hidden" aria-hidden="true">
      <div class="modal-box">
        <button id="contact-close" type="button" class="modal-close">Close</button>
        <h3>მომწერე</h3>
        <form id="contact-form" action="https://formspree.io/f/xqarwkwl" method="POST">
          <label>თქვენი სახელი:</label>
          <input type="text" name="name" required>
          <label>თქვენი email:</label>
          <input type="email" name="email" required>
          <label>ტექსტი:</label>
          <textarea name="message" required></textarea>
          <button type="submit">გაგზავნა</button>
          <p id="contact-status" style="margin:8px 0 0 0;"></p>
        </form>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
