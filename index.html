<!doctype html>
<html lang="ka">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Cube Cubic</title>
  <link rel="stylesheet" href="styles.css" />
  <!-- Фавикон -->
  <link rel="icon" type="image/png" href="images/smallcube.png">
</head>
<body>
  <header>
    <h1>Cube Cubic</h1>
    <p class="muted">კეთილი იყოს თქვენი მობრძანება</p>
    <nav style="margin-top:12px;">
      <a href="index.html" style="color:#fff; text-decoration:none; margin-right:12px;">მთავარი</a>
      <a href="admin.html" style="color:#fff; text-decoration:none;">Admin</a>
    </nav>
  </header>

  <main>
    <section aria-labelledby="albums-heading">
      <h2 id="albums-heading">ალბომები</h2>
      <div class="controls" role="region" aria-label="Album controls">
        <div style="display:flex;align-items:center;gap:8px;">
          <label for="album-select">ალბომი</label>
          <select id="album-select" aria-label="Album select">
            <option value="">— Loading —</option>
          </select>
        </div>
        <div id="subalbum-wrapper" style="display:flex;align-items:center;gap:8px;">
          <label id="subalbum-label" for="subalbum-select" style="display:none;">ქვეალბომი</label>
          <select id="subalbum-select" aria-label="Subalbum select" style="display:none;">
            <option value="">— —</option>
          </select>
        </div>
        <div style="margin-left:auto; display:flex; gap:8px;">
          <button id="refresh-btn" type="button">Refresh</button>
        </div>
      </div>
    </section>

    <section aria-labelledby="tracks-heading">
      <h2 id="tracks-heading">ტრეკები</h2>
      <div id="tracks" aria-live="polite"></div>
    </section>
  </main>

  <!-- Плеер -->
  <div id="player" class="hidden" role="region" aria-label="Player">
    <div class="player-bar">
      <div id="player-cover">
        <img id="player-cover-img" src="images/midcube.png" alt="cover">
      </div>
      <div id="player-info">
        <div id="player-title">Title</div>
        <div id="player-artist">Artist</div>
      </div>
      <div id="player-controls">
        <button id="prev" type="button">⏮</button>
        <button id="play" type="button">▶</button>
        <button id="next" type="button">⏭</button>
        <button id="show-lyrics" type="button" style="display:none;">ტექსტი</button>
        <a id="download" href="#" download style="display:none;">ჩამოტვირთვა</a>
        <input id="volume" type="range" min="0" max="1" step="0.01" value="1">
      </div>
    </div>
    <div id="player-progress">
      <span id="time-current">0:00</span>
      <input id="progress" type="range" min="0" max="100" value="0">
      <span id="time-duration">0:00</span>
    </div>
    <audio id="audio" preload="none"></audio>
  </div>

  <!-- Модалка для текста -->
  <div id="lyrics-modal" class="hidden" aria-hidden="true">
    <div class="modal-box">
      <button id="modal-close" type="button">Close</button>
      <h3 id="modal-title">Lyrics</h3>
      <pre id="modal-lyrics"></pre>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
