<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cube Cubic</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Header -->
  <header class="site-header">
    <div class="brand">
      <img src="images/midcube.png" alt="midcube">
      <span class="brand-title">CUBE CUBIC</span>
    </div>
    <nav class="site-nav">
      <a href="#">Home</a>
      <a href="#">About</a>
      <a href="#">Contact</a>
      <a href="admin.html" class="admin-btn">Admin Panel</a>
    </nav>
  </header>

  <!-- Search -->
  <section class="search-section">
    <div class="search-bar">
      <input type="text" id="search" placeholder="Search">
    </div>
  </section>

  <!-- Albums -->
  <section class="albums-section">
    <h2 class="section-title">Albums</h2>
    <div id="albums" class="albums-grid"></div>
  </section>

  <!-- Tracks -->
  <section class="tracks-section">
    <h2 class="section-title">Tracks</h2>
    <table id="tracks" class="tracks-table">
      <thead>
        <tr>
          <th>#</th>
          <th>Cover</th>
          <th>Title</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </section>

  <!-- Player -->
  <footer class="player-footer">
    <div id="player" class="player">
      <div class="player-left">
        <span id="player-title">—</span>
      </div>
      <div class="player-center">
        <div class="progress">
          <div class="progress-bar" id="player-progress">
            <div class="progress-handle" id="player-handle"></div>
          </div>
          <div class="progress-time">
            <span id="player-current">0:00</span>
            <span id="player-duration">0:00</span>
          </div>
        </div>
      </div>
      <div class="player-right">
        <button id="btn-prev">⏮</button>
        <button id="btn-play">⏯</button>
        <button id="btn-next">⏭</button>
        <input type="range" id="volume" min="0" max="100" value="80">
      </div>
    </div>
  </footer>

  <!-- Модалка кавера -->
  <div id="cover-modal" class="cover-modal" aria-hidden="true">
    <button id="cover-modal-close" class="cover-modal-close">×</button>
    <img id="cover-modal-img" src="" alt="Cover">
  </div>

  <!-- Модалка текста -->
  <div id="lyrics-modal" class="lyrics-modal hidden" aria-hidden="true">
    <div class="lyrics-content">
      <div class="lyrics-header">
        <h3 id="modal-title">Lyrics</h3>
        <button id="close-lyrics">×</button>
      </div>
      <pre id="modal-lyrics"></pre>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
