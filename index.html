<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cube Cubic</title>
<link rel="stylesheet" href="styles.css">
<link rel="icon" type="image/png" href="images/midcube.png">
</head>
<body>
<div class="site-wrapper">
<header>
<div id="header-badge">
<img src="images/midcube.png" alt="Cube Cubic Logo">
</div>
<h1>Cube Cubic</h1>
<button id="contact-btn" type="button">✉ კონტაქტი</button>
<button id="share-btn" type="button">🔗 გაზიარება</button>
<a id="hidden-admin-link" href="admin.html">Admin</a>
</header>

<main class="new-main-layout">
<aside class="albums-sidebar">
<div id="player-sidebar" class="player-sidebar-block">
<div class="player-cover-wrapper">
<div id="player-cover-blur" class="player-cover-blur"></div>
<img id="player-cover-img" src="images/midcube.png" alt="Album Cover">
</div>
<div class="player-info">
<div id="player-title-sidebar" class="player-title">აირჩიეთ ტრეკი</div>
<div id="player-artist-sidebar" class="player-artist"></div>
</div>
<div class="player-controls">
<button id="prev-sidebar" type="button">⮜</button>
<button id="play-sidebar" type="button">▶</button>
<button id="next-sidebar" type="button">⮞</button>
</div>
<div class="player-progress-wrapper">
<input type="range" id="progress-sidebar" min="0" max="100" value="0">
<div class="player-times">
<span id="time-current-sidebar">0:00</span>
<span id="time-duration-sidebar">0:00</span>
</div>
</div>
<div class="player-volume-wrapper">
<span>🔊</span>
<input type="range" id="volume-sidebar" min="0" max="1" step="0.01" value="1">
</div>
</div>

<div class="controls">
<input type="text" id="global-search" placeholder="ძიება...">
<div class="control-row">
<button id="refresh-btn" type="button">Refresh</button>
<span id="track-count-display" class="track-count">სულ ტრეკი: 0</span>
</div>
<div class="filter-buttons-row">
<button id="newest-tracks-btn" class="newest-btn" type="button">უახლესი ტრეკები</button>
<button id="liked-tracks-btn" class="liked-btn" type="button">რა მომეწონა</button>
</div>
<label>ალბამები</label>
<div id="album-list" class="album-list-vertical"></div>
</div>
</aside>

<section class="tracks-section">
<div class="tracks-header">
<h2 id="tracks-title">ტრეკები</h2>
</div>
<div id="tracks" class="tracks-list-grid"></div>
</section>
</main>
</div>

<audio id="audio" preload="metadata"></audio>

<div id="lyrics-modal" class="hidden">
<div class="modal-box">
<button id="modal-close" type="button">✕ დახურვა</button>
<h3 id="modal-title"></h3>
<pre id="modal-lyrics"></pre>
</div>
</div>

<div id="contact-modal" class="hidden">
<div class="modal-box contact-modal-box">
<button id="contact-modal-close" type="button">✕ დახურვა</button>
<h3>✉ კონტაქტი</h3>
<p class="contact-description">გამოგვიგზავნეთ შეტყობინება</p>
<form id="contact-form">
<input type="hidden" name="access_key" value="YOUR_WEB3FORMS_KEY">
<label>თქვენი სახელი *</label>
<input type="text" name="name" required>
<label>თქვენი ელ-ფოსტა *</label>
<input type="email" name="email" required>
<label>შეტყობინება *</label>
<textarea name="message" required></textarea>
<div class="contact-actions">
<button id="contact-cancel" type="button">გაუქმება</button>
<button id="contact-submit" type="submit">გაგზავნა</button>
</div>
</form>
<div id="contact-status" class="contact-status hidden"></div>
</div>
</div>

<div id="comments-modal" class="comments-modal hidden">
<div class="modal-box comment-modal-box">
<button id="comments-modal-close" class="modal-close-btn" type="button">✕</button>
<h3 id="comments-track-title">კომენტარები</h3>
<div id="comments-list" class="comments-list"></div>
<div class="comment-form-wrapper">
<textarea id="comment-text" placeholder="დაწერეთ კომენტარი..." rows="3"></textarea>
<div class="comment-form-actions">
<button id="comment-cancel" type="button">გაუქმება</button>
<button id="comment-submit" type="button">გაგზავნა</button>
</div>
</div>
</div>
</div>

<div id="toast" class="hidden"></div>
<button id="scroll-to-top" type="button">↑</button>

<script type="module" src="firebase-config.js"></script>
<script src="app.js"></script>
</body>
</html>
