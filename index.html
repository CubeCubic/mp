<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cube Cubic</title>
  <link rel="icon" href="/mp/favicon.ico">
  <link rel="stylesheet" href="/mp/styles.css">
</head>
<body>
  <header class="site-header">
    <div class="brand">
      <img src="/mp/midcube.png" alt="Cube Cubic Logo" class="logo" onerror="this.src='/mp/placeholder-logo.png'">
      <span class="brand-title">CUBE CUBIC</span>
    </div>
    <nav class="site-nav">
      <a href="/mp/index.html">Home</a>
      <a href="#" aria-disabled="true">About</a>
      <a href="#" aria-disabled="true">Contact</a>
      <a href="/mp/admin.html" class="admin-btn">Admin Panel</a>
    </nav>
  </header>

  <section class="search-section" aria-label="Search">
    <div class="search-bar">
      <input type="text" id="search" placeholder="Search" autocomplete="off">
    </div>
  </section>

  <section class="albums-section" aria-label="Albums">
    <h2 class="section-title">Albums</h2>
    <div id="albums" class="albums-grid"></div>
  </section>

  <section class="tracks-section" aria-label="Tracks">
    <h2 class="section-title">Tracks</h2>
    <div class="table-wrap">
      <table id="tracks" class="tracks-table">
        <thead>
          <tr>
            <th class="col-num">#</th>
            <th class="col-cover" title="Cover">Cover</th>
            <th class="col-title">Title</th>
            <th class="col-actions">Action</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </section>

  <footer class="player-footer" aria-label="Player">
    <div id="player" class="player">
      <div class="player-left">
        <span id="player-title">—</span>
      </div>
      <div class="player-center">
        <div class="progress">
          <div class="progress-bar" id="player-progress">
            <div class="progress-handle" id="player-handle"></div>
          </div>
          <div class="progress-time">
            <span id="player-current">0:00</span>
            <span id="player-duration">0:00</span>
          </div>
        </div>
      </div>
      <div class="player-right">
        <button id="btn-prev" class="btn btn-icon" title="Previous">⏮</button>
        <button id="btn-play" class="btn btn-icon btn-accent" title="Play/Pause">⏯</button>
        <button id="btn-next" class="btn btn-icon" title="Next">⏭</button>
        <div class="volume">
          <span class="vol-icon">🔊</span>
          <input type="range" id="volume" min="0" max="100" value="80" aria-label="Volume">
        </div>
      </div>
    </div>
  </footer>

  <div id="cover-modal" class="cover-modal" aria-hidden="true" role="dialog" aria-label="Cover preview">
    <button id="cover-modal-close" class="cover-modal-close" aria-label="Close">×</button>
    <img id="cover-modal-img" src="" alt="Cover" class="cover-modal-img">
  </div>

  <div id="lyrics-modal" class="lyrics-modal hidden" aria-hidden="true" role="dialog" aria-label="Lyrics">
    <div class="lyrics-content">
      <div class="lyrics-header">
        <h3 id="modal-title" class="lyrics-title">Lyrics</h3>
        <button id="close-lyrics" class="lyrics-close" aria-label="Close">×</button>
      </div>
      <pre id="modal-lyrics" class="lyrics-text"></pre>
    </div>
  </div>

  <script src="/mp/app.js"></script>
</body>
</html>
