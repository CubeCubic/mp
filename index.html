<!doctype html>
<html lang="ka">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Cube Cubic</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" type="image/png" href="images/smallcube.png">
</head>
<body>
  <div class="site-wrapper">
    <header>
      <div id="header-left">
        <div id="header-badge" aria-hidden="false">
          <img src="images/midcube.png" alt="midcube">
        </div>

        <h1>
          <a id="brand-link" href="index.html" aria-label="Home">Cube Cubic</a>
        </h1>
      </div>

      <!-- Плеер -->
      <div id="header-player" aria-label="Header player">
        <div id="player-cover" class="header-player-cover" aria-hidden="false">
          <img id="player-cover-img" src="images/midcube.png" alt="Cover">
        </div>

        <div id="player-info-header" class="player-info-header" aria-hidden="false">
          <div id="player-title-header" class="player-title">აირჩიეთ ტრეკი</div>
          <div id="player-artist-header" class="player-artist"></div>
        </div>

        <div id="player-controls-header" class="player-controls-header" aria-hidden="false">
          <button id="prev-sidebar" type="button" aria-label="Previous">⏮</button>
          <button id="play-sidebar" type="button" aria-label="Play/Pause">▶</button>
          <button id="next-sidebar" type="button" aria-label="Next">⏭</button>
        </div>

        <div id="player-progress-header" class="player-progress-header" aria-hidden="false">
          <span id="time-current-sidebar">0:00</span>
          <input id="progress-sidebar" type="range" min="0" max="100" value="0" aria-label="Progress">
          <span id="time-duration-sidebar">0:00</span>
        </div>

        <div id="player-volume-header" class="player-volume-header" aria-hidden="false">
          <input id="volume-sidebar" type="range" min="0" max="1" step="0.01" value="1" aria-label="Volume">
        </div>
      </div>

      <a href="admin.html" id="hidden-admin-link" aria-label="Admin">Admin</a>
    </header>

    <main class="new-main-layout">
      <aside class="albums-sidebar">
        <div class="controls">
          <input id="global-search" type="text" placeholder="Search albums, subalbums, tracks..." aria-label="Global search">

          <div class="album-header">
            <label for="album-select">ალბომები</label>
            <button id="refresh-btn" type="button">Refresh</button>
          </div>

          <input type="hidden" id="album-select" value="">
          <div id="album-list" class="album-list-vertical"></div>
          <label id="subalbum-label" for="subalbum-select" style="display:none;">ქვეალბომი</label>
          <select id="subalbum-select" style="display:none;">
            <option value="">— —</option>
          </select>
        </div>

        <div id="player-sidebar" class="player-sidebar" style="display:none;" aria-hidden="true"></div>
      </aside>

      <section class="tracks-section">
        <div class="tracks-header" aria-hidden="true"></div>
        <div id="tracks" class="tracks-list-grid"></div>
      </section>
    </main>
  </div> <!-- закрытие site-wrapper -->

  <audio id="audio" preload="none"></audio>

  <div id="lyrics-modal" class="hidden" aria-hidden="true">
    <div class="modal-box">
      <button id="modal-close" type="button">Close</button>
      <h3 id="modal-title">Lyrics</h3>
      <pre id="modal-lyrics"></pre>
    </div>
  </div>

  <div id="toast" class="hidden" role="status" aria-live="polite"></div>

  <!-- Контакты: вынесены за site-wrapper -->
  <footer class="site-footer">
    <p>📧 <a href="mailto:youremail@example.com">youremail@example.com</a></p>
    <p>📞 <a href="tel:+995123456789">+995 123 456 789</a></p>
    <p>🌐 <a href="https://linkedin.com/in/yourprofile" target="_blank">LinkedIn</a></p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
