<!doctype html>
<html lang="ka">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Cube Cubic</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" type="image/png" href="images/smallcube.png">
</head>
<body>
  <div class="site-wrapper">
    <header>
      <div id="header-badge" aria-hidden="false">
        <img src="images/midcube.png" alt="midcube">
      </div>

      <h1>Cube Cubic</h1>
      <p class="muted">კეთილი იყოს თქვენი მობრძანება</p>
      <nav>
        <a href="index.html">მთავარი</a>
        <button id="contact-btn" type="button">Contact</button>
        <a href="admin.html">Admin</a>
      </nav>
    </header>

    <main class="new-main-layout">
      <aside class="albums-sidebar">
        <div class="controls">
          <input id="global-search" type="text" placeholder="Search albums, subalbums, tracks..." aria-label="Global search">

          <label for="album-select" style="display:none;">ალბომები</label>
          <input type="hidden" id="album-select" value="">
          <div id="album-list" class="album-list-vertical"></div>

          <label id="subalbum-label" for="subalbum-select" style="display:none;">ქვეალბომი</label>
          <select id="subalbum-select" style="display:none;">
            <option value="">— —</option>
          </select>

          <button id="refresh-btn" type="button">Refresh</button>
        </div>

        <!-- Новый вертикальный плеер -->
        <div id="player-sidebar" class="player-sidebar">
          <div id="player-cover">
            <img id="player-cover-img" src="images/midcube.png" alt="Cover">
          </div>
          <div id="player-info-sidebar">
            <div id="player-title-sidebar">Выберите трек</div>
            <div id="player-artist-sidebar"></div>
          </div>
          <div id="player-controls-sidebar">
            <button id="prev-sidebar" type="button" aria-label="Previous">⏮</button>
            <button id="play-sidebar" type="button" aria-label="Play/Pause">▶</button>
            <button id="next-sidebar" type="button" aria-label="Next">⏭</button>
          </div>
          <div id="player-progress-sidebar">
            <span id="time-current-sidebar">0:00</span>
            <input id="progress-sidebar" type="range" min="0" max="100" value="0" aria-label="Progress">
            <span id="time-duration-sidebar">0:00</span>
          </div>
          <div id="player-volume-sidebar">
            <input id="volume-sidebar" type="range" min="0" max="1" step="0.01" value="1" aria-label="Volume">
          </div>
          <button id="show-lyrics-sidebar" type="button" style="display:none;">ტექსტი</button>
          <a id="download-sidebar" href="#" download style="display:none;" aria-label="Download">
            <svg viewBox="0 0 24 24"><path d="M5 20h14a1 1 0 0 0 0-2H5a1 1 0 0 0 0 2zM12 3a1 1 0 0 0-1 1v8.59L8.7 10.3a1 1 0 0 0-1.4 1.4l4 4a1 1 0 0 0 1.4 0l4-4a1 1 0 0 0-1.4-1.4L13 12.59V4a1 1 0 0 0-1-1z"/></svg>
          </a>
        </div>
      </aside>

      <section class="tracks-section">
        <div class="tracks-header">
          <h2>ტრეკები</h2>
        </div>
        <div id="tracks" class="tracks-list-vertical"></div>
      </section>
    </main>
  </div>

  <!-- Аудио элемент (скрытый) -->
  <audio id="audio" preload="none"></audio>

  <!-- Модалка текстов -->
  <div id="lyrics-modal" class="hidden" aria-hidden="true">
    <div class="modal-box">
      <button id="modal-close" type="button">Close</button>
      <h3 id="modal-title">Lyrics</h3>
      <pre id="modal-lyrics"></pre>
    </div>
  </div>

  <!-- Share modal -->
  <div id="share-modal" class="hidden" aria-hidden="true">
    <div class="modal-box">
      <button id="share-modal-close" type="button">Close</button>
      <h3>Share</h3>
      <p id="share-modal-text">Share this link:</p>
      <div class="share-links">
        <a id="share-twitter" href="#" target="_blank" rel="noopener">Twitter</a>
        <a id="share-telegram" href="#" target="_blank" rel="noopener">Telegram</a>
        <a id="share-mail" href="#" target="_blank" rel="noopener">Email</a>
      </div>
      <div class="share-copy">
        <input id="share-url-input" type="text" readonly aria-label="Share URL">
        <button id="share-copy-btn" type="button">Copy</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="hidden" role="status" aria-live="polite"></div>

  <!-- Contact modal 
  <div id="contact-modal" class="hidden" aria-hidden="true">
    <div class="modal-box">
      <button id="contact-close" type="button">Close</button>
      <h3>მომწერე</h3>
      <form id="contact-form" action="https://formspree.io/f/xqarwkwl" method="POST">
        <label>თქვენი სახელი:</label>

        <button type="submit">გაგზავნა</button>
        <p id="contact-status" style="margin:8px 0 0 0;"></p>
      </form>
    </div>
  </div> -->

  <script src="app.js"></script> -->
</body>

</html>
