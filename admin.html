<!doctype html>
<html lang="ka">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Admin — Cube Cubic</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    /* --- Layout variables --- */
    :root{
      --site-header-height: 64px;
      --site-header-safety: 12px;
      --site-header-total: calc(var(--site-header-height) + var(--site-header-safety));
      --compact-gap: 8px;
      --compact-padding: 10px;
      --compact-font-size: 13px;
      --panel-radius: 8px;
      --admin-max-width: 980px;
    }

    /* Ensure header doesn't cover content */
    html { scroll-padding-top: var(--site-header-total); }
    body {
      font-family: Arial, sans-serif;
      color: #fff;
      background: #111;
      padding: calc(var(--site-header-total)) 12px 12px 12px;
      margin: 0;
      font-size: 14px;
      line-height: 1.3;
    }
    input, textarea, select, button { scroll-margin-top: var(--site-header-total); }

    main#admin-app {
      max-width: var(--admin-max-width);
      margin: 0 auto;
      width: 100%;
      box-sizing: border-box;
    }

    header { margin: 0 0 8px 0; padding: 6px 0; display:flex; align-items:center; gap:12px; }
    h1 { color: #ffcc00; margin: 0 0 6px 0; font-size: 18px; line-height: 1.1; }
    .hidden { display: none; }

    .panel {
      background: rgba(0,0,0,0.6);
      padding: var(--compact-padding);
      border-radius: var(--panel-radius);
      margin-bottom: 10px;
      box-sizing: border-box;
      font-size: var(--compact-font-size);
    }

    label { display:block; margin:6px 0 4px; color:#ffd; font-weight:600; font-size:13px; }

    input[type="text"], input[type="password"], select, textarea {
      width:100%;
      padding:8px;
      border-radius:6px;
      border:1px solid #333;
      background:#111;
      color:#fff;
      box-sizing: border-box;
      font-size: 13px;
    }

    .row { display:flex; gap:10px; align-items:flex-start; flex-wrap:wrap; }
    .col { flex:1; min-width:200px; }
    .small { width:180px; flex:0 0 180px; min-width:140px; }

    button {
      background:#444;
      color:#fff;
      padding:8px 10px;
      border-radius:6px;
      border:none;
      cursor:pointer;
      font-size: 13px;
    }
    button:hover { background:#666; }

    .list {
      margin-top:8px;
      max-height:300px;
      overflow:auto;
      border-top:1px dashed rgba(255,255,255,0.06);
      padding-top:8px;
    }
    .item {
      padding:6px;
      border-radius:6px;
      display:flex;
      gap:8px;
      align-items:center;
      background:rgba(255,255,255,0.02);
      margin-bottom:8px;
      font-size: 13px;
    }
    .meta { flex:1; color:#ddd; font-size: 13px; }
    .muted { color:#999; font-size:12px; }
    .note { color:#ccc; font-size:12px; margin-top:6px; }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2000;
    }
    .modal-backdrop.hidden { display: none !important; }
    .modal {
      background: #fff; color: #000;
      border-radius: 8px; width: 420px; max-width: 95%;
      padding: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.6);
      font-size: 13px;
    }
    .modal h3 { margin-top: 0; font-size: 16px; }
    .modal .actions { display:flex; justify-content:flex-end; gap:8px; margin-top:10px; }

    #logout-btn { margin-top: 8px; padding: 8px 10px; background: #333; border-radius: 6px; }

    #add-track-form textarea { min-height: 80px; }
    #albums-list .item, #admin-tracks .item { padding: 6px; }
    .small button { width:100%; box-sizing:border-box; }

    #login-form { margin-top: 48px; }
    @media (max-width: 720px) {
      :root { --site-header-height: 56px; --site-header-safety: 12px; }
      .row { gap:8px; }
      .small { width: 100%; flex: 1 1 100%; }
      .col { min-width: 100%; }
      body { padding-left: 10px; padding-right: 10px; }
      #login-form { margin-top: 56px; }
    }

    .track-search-wrap { display:flex; gap:8px; align-items:center; margin-bottom:8px; }
    #track-search { flex:1; padding:8px; border-radius:6px; border:1px solid #333; background:#0f0f0f; color:#fff; }
    #track-search-clear { background: transparent; border: 1px solid rgba(255,255,255,0.06); color:#fff; padding:6px 8px; border-radius:6px; cursor:pointer; }
    #track-search-clear:hover { background: rgba(255,255,255,0.02); }

    /* Центрирование кнопки сохранения */
    .save-btn-wrapper {
      display: flex;
      justify-content: center;
      margin-top: 8px;
    }
    #btn-save-all {
      width: auto;
      padding: 8px 14px;
      background: #c62828;
      color: #fff;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(198,40,40,0.25);
    }
    #btn-save-all:hover {
      background: #e53935;
    }

    /* Small accessibility tweak for focus */
    #btn-save-all:focus { outline: 3px solid rgba(255,255,255,0.08); outline-offset: 2px; }
  </style>
</head>
<body>
  <header>
    <h1>ადმინისტრატორი</h1>
    <a href="index.html" style="color:#fff; font-size:13px">მთავარი გვერდი</a>
  </header>

  <main id="admin-app">
    <!-- Login panel -->
    <div id="login-panel" class="panel" aria-live="polite">
      <h2 style="margin:0 0 8px 0; font-size:16px">შესვლა</h2>

      <!-- Prevent any accidental navigation or POST to the server:
           form has no action and we explicitly prevent submission in script. -->
      <form id="login-form" style="margin:0" novalidate>
        <input id="admin-password" name="password" type="password" placeholder="პაროლი" autocomplete="current-password" />
        <div style="margin-top:8px; display:flex; align-items:center; gap:8px;">
          <!-- Keep id="login-btn". Use type="button" to avoid native submit navigation. -->
          <button id="login-btn" type="button" aria-label="Login">შესვლა</button>
          <span id="login-msg" class="muted" style="margin-left:6px" aria-live="polite"></span>
        </div>
      </form>
    </div>

    <!-- Admin panel (hidden until authenticated) -->
    <div id="admin-panel" class="hidden" aria-hidden="true">
      <div class="panel">
        <h2 style="margin:0 0 8px 0; font-size:15px">ალბომები</h2>
        <div class="row">
          <div class="col">
            <label for="album-name">სახელი</label>
            <input id="album-name" type="text" />
          </div>
          <div class="small">
            <label for="album-parent">Parent</label>
            <select id="album-parent"><option value="">— მთავარი ალბომი —</option></select>
          </div>
          <div class="small" style="display:flex;flex-direction:column;gap:8px;">
            <button id="btn-create-album" type="button">Create album</button>
            <button id="btn-refresh-albums" type="button">Refresh</button>

            <!-- Центрированная кнопка сохранения -->
            <div class="save-btn-wrapper">
              <button id="btn-save-all" type="button">არ დაგავიწყდეს დამახსოვრება</button>
            </div>

          </div>
        </div>
        <div class="list" id="albums-list"></div>
      </div>

      <div class="panel" id="tracks-panel">
        <h2 style="margin:0 0 8px 0; font-size:15px">ტრეკები</h2>
        <div class="track-search-wrap">
          <input id="track-search" type="text" placeholder="Search tracks..." />
          <button id="track-search-clear" type="button">Clear</button>
        </div>

        <div id="admin-tracks" class="list">
          <!-- Example item -->
          <div class="item">
            <div class="meta">Example Track</div>
            <div><button class="small" type="button">Edit</button></div>
          </div>
        </div>

        <div style="margin-top:10px;">
          <form id="add-track-form" onsubmit="return false;">
            <label for="new-track-title">New track title</label>
            <input id="new-track-title" type="text" />
            <label for="new-track-lyrics" style="margin-top:8px;">Lyrics</label>
            <textarea id="new-track-lyrics"></textarea>
            <div style="margin-top:8px; display:flex; gap:8px;">
              <button id="btn-add-track" type="button">Add track</button>
              <button id="btn-upload-cover" type="button">Upload cover</button>
            </div>
          </form>
        </div>
      </div>

      <div class="panel">
        <h2 style="margin:0 0 8px 0; font-size:15px">Settings</h2>
        <div class="row">
          <div class="col">
            <label for="site-title">Site title</label>
            <input id="site-title" type="text" />
          </div>
          <div class="small">
            <label for="site-theme">Theme</label>
            <select id="site-theme"><option value="deep">Deep Ocean</option><option value="light">Light</option></select>
          </div>
        </div>
        <div class="note">Changes here affect public site after saving.</div>
      </div>

      <div style="text-align:right; margin-top:8px;">
        <button id="logout-btn" type="button">Logout</button>
      </div>
    </div>
  </main>

  <!-- Inline script to prevent accidental navigation/POST and to provide a safe client-side login fallback.
       This avoids server POSTs that can produce "405 Not Allowed" and also prevents unhandled form submits.
       If you have an existing admin.js that handles login, it will still be loaded after this script.
       The script first prevents default form submission, then attaches a click handler to #login-btn.
       It performs a simple client-side check: if password is non-empty, show admin panel.
       You can replace the check with a call to your real authentication endpoint later. -->
  <script>
    (function () {
      // Prevent the form from ever submitting via HTTP
      var loginForm = document.getElementById('login-form');
      if (loginForm) {
        loginForm.addEventListener('submit', function (e) {
          e.preventDefault();
          e.stopPropagation();
        }, { passive: false });
      }

      var loginBtn = document.getElementById('login-btn');
      var passwordInput = document.getElementById('admin-password');
      var loginMsg = document.getElementById('login-msg');
      var loginPanel = document.getElementById('login-panel');
      var adminPanel = document.getElementById('admin-panel');
      var logoutBtn = document.getElementById('logout-btn');

      // Helper to show admin panel
      function showAdminPanel() {
        if (loginPanel) loginPanel.classList.add('hidden');
        if (adminPanel) {
          adminPanel.classList.remove('hidden');
          adminPanel.setAttribute('aria-hidden', 'false');
        }
        if (loginMsg) loginMsg.textContent = '';
      }

      // Helper to hide admin panel
      function hideAdminPanel() {
        if (adminPanel) {
          adminPanel.classList.add('hidden');
          adminPanel.setAttribute('aria-hidden', 'true');
        }
        if (loginPanel) loginPanel.classList.remove('hidden');
        if (passwordInput) passwordInput.value = '';
        if (loginMsg) loginMsg.textContent = '';
      }

      // Attach click handler to login button
      if (loginBtn) {
        loginBtn.addEventListener('click', function (ev) {
          ev.preventDefault();
          ev.stopPropagation();

          // Basic client-side fallback authentication:
          // If password field is empty — show message.
          // If non-empty — reveal admin panel locally (no network request).
          // This avoids server POSTs that can return 405.
          var pwd = passwordInput ? passwordInput.value.trim() : '';
          if (!pwd) {
            if (loginMsg) {
              loginMsg.textContent = 'გთხოვთ შეიყვანოთ პაროლი';
              loginMsg.style.color = '#ffb3b3';
            }
            return;
          }

          // Optionally: if you want a fixed test password for local use, uncomment and set:
          // if (pwd !== 'your-test-password') { loginMsg.textContent = 'პაროლი არასწორია'; return; }

          // Reveal admin UI locally
          showAdminPanel();

          // If admin.js exists and expects a programmatic login event, dispatch a custom event
          // so existing scripts can react (non-blocking).
          try {
            var evt = new CustomEvent('admin:login', { detail: { password: pwd } });
            window.dispatchEvent(evt);
          } catch (e) {
            // ignore
          }
        }, false);
      }

      // Logout handler
      if (logoutBtn) {
        logoutBtn.addEventListener('click', function (ev) {
          ev.preventDefault();
          ev.stopPropagation();
          hideAdminPanel();
        }, false);
      }

      // Defensive: catch unhandled promise rejections to avoid noisy console errors
      // (this does not suppress real errors in your scripts, but reduces "message port closed" noise).
      window.addEventListener('unhandledrejection', function (event) {
        // If the rejection is from an extension/service worker message port closing,
        // ignore it to avoid confusing the user. Otherwise, rethrow.
        try {
          var reason = event.reason && (event.reason.message || event.reason.toString && event.reason.toString());
          if (reason && /message port closed/i.test(reason)) {
            // swallow this specific noisy rejection
            event.preventDefault();
          }
        } catch (e) {
          // noop
        }
      });

      // Ensure no accidental navigation when pressing Enter in password field triggers form submit
      if (passwordInput) {
        passwordInput.addEventListener('keydown', function (e) {
          if (e.key === 'Enter') {
            e.preventDefault();
            e.stopPropagation();
            if (loginBtn) loginBtn.click();
          }
        }, false);
      }
    })();
  </script>

  <!-- Load existing admin.js after inline safeguards so it can attach its handlers if present.
       If admin.js performs network requests, the inline safeguards above prevent accidental form POSTs. -->
  <script src="admin.js"></script>
</body>
</html>
