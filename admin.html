<!doctype html>
<html lang="ka">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Admin — Cube Cubic</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body { font-family: Arial, sans-serif; color: #fff; background: #111; padding: 18px; }
    header { margin-bottom: 12px; }
    h1 { color: #ffcc00; margin: 0 0 8px 0; }
    .hidden { display: none; }
    .panel { background: rgba(0,0,0,0.6); padding: 12px; border-radius: 8px; margin-bottom: 12px; }
    label { display:block; margin:8px 0 4px; color:#ffd; font-weight:600; }
    input[type="text"], input[type="password"], select, textarea { width:90%; padding:8px; border-radius:6px; border:1px solid #333; background:#111; color:#fff; }
    .row { display:flex; gap:12px; align-items:flex-start; }
    .col { flex:1; }
    .small { width:220px; flex:0 0 220px; }
    button { background:#444; color:#fff; padding:8px 12px; border-radius:6px; border:none; cursor:pointer; }
    button:hover { background:#666; }
    .list { margin-top:12px; max-height:320px; overflow:auto; border-top:1px dashed rgba(255,255,255,0.06); padding-top:8px; }
    .item { padding:8px; border-radius:6px; display:flex; gap:8px; align-items:center; background:rgba(255,255,255,0.02); margin-bottom:8px; }
    .meta { flex:1; color:#ddd; }
    .muted { color:#999; font-size:13px; }
    .note { color:#ccc; font-size:13px; margin-top:6px; }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2000;
    }
    .modal-backdrop.hidden { display: none !important; }
    .modal {
      background: #fff; color: #000;
      border-radius: 8px; width: 420px; max-width: 95%;
      padding: 16px; box-shadow: 0 8px 30px rgba(0,0,0,0.6);
    }
    .modal h3 { margin-top: 0; }
    .modal .actions { display:flex; justify-content:flex-end; gap:8px; margin-top:12px; }
  </style>
</head>
<body>
  <header>
    <h1>ადმინისტრატორი</h1>
    <a href="index.html" style="color:#fff">მთავარი გვერდი</a>
  </header>

  <main id="admin-app">
    <div id="login-form" class="panel">
      <h2>შესვლა</h2>
      <form id="login-form-wrapper" style="margin:0">
        <input id="admin-password" type="password" placeholder="პაროლი" />
        <div style="margin-top:8px">
          <button id="login-btn" type="button">შესვლა</button>
          <span id="login-msg" class="muted" style="margin-left:10px"></span>
        </div>
      </form>
    </div>

    <div id="admin-panel" class="hidden">
      <div class="panel">
        <h2>ალბომები</h2>
        <div class="row">
          <div class="col">
            <label for="album-name">სახელი</label>
            <input id="album-name" type="text">
          </div>
          <div class="small">
            <label for="album-parent">Parent</label>
            <select id="album-parent"><option value="">— მთავარი ალბომი —</option></select>
          </div>
          <div class="small" style="display:flex;flex-direction:column;gap:8px;">
            <button id="btn-create-album">Create album</button>
            <button id="btn-refresh-albums">Refresh</button>
            <button id="btn-save-all" type="button" style="background:#ff0000; color:#fff; font-weight:bold;">ატვირთე github-ზე</button>
          </div>
        </div>
        <div class="list" id="albums-list"></div>
      </div>

      <div class="panel">
        <h2>ტრეკის დამატება</h2>
        <form id="add-track-form">
          <div class="row">
            <div class="col">
              <label>Title</label>
              <input name="title" required>
              <label>Artist</label>
              <input name="artist">
              <label>Lyrics</label>
              <textarea name="lyrics"></textarea>
            </div>
            <div class="small">
              <label>Album</label>
              <select id="track-album-select" name="album"></select>
              <label>Audio URL</label>
              <input name="audioUrl">
              <label>Cover URL</label>
              <input name="coverUrl">
              <button type="submit">დამატება</button>
            </div>
          </div>
        </form>
      </div>

      <div class="panel">
        <h2>არსებული ტრეკები</h2>
        <button id="btn-refresh-tracks">Refresh tracks</button>
        <div id="admin-tracks" class="list"></div>
      </div>

      <button id="logout-btn">გასვლა</button>
    </div>
  </main>

  <!-- Modal for editing album -->
  <div id="album-edit-modal" class="modal-backdrop hidden">
    <div class="modal">
      <h3>Edit album</h3>
      <label>Name</label>
      <input id="modal-album-name">
      <label>Parent album</label>
      <select id="modal-album-parent"></select>
      <div class="actions">
        <button id="modal-cancel">Cancel</button>
        <button id="modal-save">Save</button>
      </div>
    </div>
  </div>

  <!-- Modal for editing track -->
  <div id="track-edit-modal" class="modal-backdrop hidden">
    <div class="modal">
      <h3>Edit track</h3>
      <label>Title</label>
      <input id="modal-track-title">
      <label>Artist</label>
      <input id="modal-track-artist">
      <label>Lyrics</label>
      <textarea id="modal-track-lyrics"></textarea>
      <label>Album</label>
      <select id="modal-track-album"></select>
      <label>Audio URL</label>
      <input id="modal-track-audioUrl">
      <label>Cover URL</label>
      <input id="modal-track-coverUrl">
      <div class="actions">
        <button id="modal-track-cancel">Cancel</button>
        <button id="modal-track-save">Save</button>
      </div>
    </div>
  </div>

  <script src="admin.js"></script>
</body>
</html>
